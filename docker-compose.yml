version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: career-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: careerdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - career-network

  backend:
    build: ./backend
    container_name: career-backend
    environment:
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: careerdb
      DB_HOST: postgres
      DB_PORT: 5432
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - career-network

  frontend:
    build: ./frontend
    container_name: career-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - career-network

volumes:
  postgres_data:

networks:
  career-network: